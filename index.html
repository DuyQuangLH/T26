<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Memory Garden — 8/3</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --rose: #ff6fa3;
    --rose-2: #ffb3d1;
    --leaf: #49b57b;
    --bg-1:#fffbee;
    --bg-2:#fff0f6;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    font-family:'Quicksand',sans-serif;
    background: linear-gradient(180deg,var(--bg-2) 0%, var(--bg-1) 60%);
    color:#222;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
  }

  /* LAYOUT */
  .wrap{
    position:relative;
    width:100%;
    height:100vh;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    padding-bottom:40px;
  }

  .ui {
    position: absolute;
    top:32px;
    left:32px;
    z-index:50;
  }
  h1{
    font-family:'Dancing Script',cursive;
    color:var(--rose);
    margin:0 0 6px 0;
    font-size:44px;
    text-shadow:0 6px 18px rgba(255,111,153,0.15);
  }
  .subtitle{font-size:13px;color:#6b6b6b;margin-bottom:10px}
  .controls{display:flex;gap:10px;align-items:center}
  button{
    background:linear-gradient(180deg,var(--rose) 0%,var(--rose-2) 100%);
    border:none;color:white;padding:10px 16px;border-radius:999px;
    cursor:pointer;font-weight:600;box-shadow:0 8px 24px rgba(255,111,153,0.14);
  }
  button[disabled]{opacity:.5;cursor:not-allowed}

  /* GARDEN */
  #garden{
    position:relative;
    width:100%;
    height:78vh;
    max-width:1100px;
    margin:0 auto;
    background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.6), transparent 10%),
                linear-gradient(180deg, rgba(255,255,255,0.06), transparent 40%);
    border-radius:20px;
    overflow:hidden;
    box-shadow: 0 30px 80px rgba(20,20,20,0.08);
  }

  /* GROUND */
  .ground{
    position:absolute;
    bottom:0;
    left:0;
    right:0;
    height:160px;
    background: linear-gradient(180deg,#dfffe0 0%, #c6f1d3 100%);
    border-top-left-radius:40% 18%;
    border-top-right-radius:40% 18%;
    box-shadow: inset 0 8px 30px rgba(0,0,0,0.03);
  }

  /* TRUNK */
  #trunk{
    position:absolute;
    bottom:90px; /* base above the ground */
    left:50%;
    transform:translateX(-50%);
    width:18px;
    height:0px;
    background:linear-gradient(180deg,#5b3a2a,#3e2a20);
    border-radius:12px;
    transition: height 1.6s cubic-bezier(.2,.9,.2,1);
    z-index:20;
  }
  #trunk.grown{ height:260px; }

  /* branch base style */
  .branch{
    position:absolute;
    width:8px;
    height:0px;
    background:linear-gradient(180deg,#5b3a2a,#3e2a20);
    transform-origin: bottom center;
    border-radius:6px;
    z-index:18;
    transition: height 1.0s ease, transform 1.0s ease;
    pointer-events:auto;
  }

  /* flowers */
  .flower{
    position:absolute;
    width:46px;
    height:46px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:11px;
    color:white;
    padding:6px;
    text-align:center;
    box-shadow:0 12px 30px rgba(0,0,0,0.12);
    transform-origin:center;
    transform: scale(0.15);
    opacity:0;
    transition: transform .6s cubic-bezier(.2,.9,.2,1), opacity .5s ease;
    cursor:pointer;
    z-index:25;
  }
  .flower.show{ transform: scale(1); opacity:1; }

  /* tooltip when click flower */
  .tooltip{
    position:absolute;
    background: white;
    color:#222;
    padding:10px 12px;
    border-radius:10px;
    font-size:13px;
    box-shadow:0 12px 40px rgba(0,0,0,0.12);
    transform:translate(-50%,-110%);
    white-space:nowrap;
    z-index:40;
    opacity:0;
    pointer-events:none;
    transition:opacity .18s ease;
  }
  .tooltip.show{ opacity:1; pointer-events:auto; }

  /* message card */
  .card{
    position:absolute;
    left:50%;
    top:16%;
    transform:translate(-50%,-10%) scale(.9);
    width:380px;
    background:rgba(255,255,255,0.98);
    border-radius:18px;
    padding:22px;
    box-shadow:0 30px 80px rgba(40,40,40,0.08);
    text-align:center;
    z-index:60;
    opacity:0; transition:all .6s cubic-bezier(.2,.9,.2,1);
  }
  .card.show{ opacity:1; transform:translate(-50%,-10%) scale(1); }
  .card h2{ margin:0; font-family:'Dancing Script'; color:var(--rose); font-size:30px; }
  .card p{ color:#444; line-height:1.6; margin-top:10px; font-size:14px; }

  /* small footer signature */
  .signature{
    position: absolute;
    right:22px;
    bottom:22px;
    font-family:'Dancing Script';
    color:var(--rose);
    z-index:70;
    font-size:18px;
  }

  /* responsive */
  @media (max-width:640px){
    h1{font-size:32px}
    .card{width:88%}
    .flower{width:40px;height:40px;font-size:10px}
  }
</style>
</head>
<body>

<div class="ui">
  <h1>Memory Garden</h1>
  <div class="subtitle">Gieo hạt → tưới nước → từng bông hoa nở lời chúc</div>
  <div class="controls">
    <button id="btn-sow">🌱 Gieo hạt</button>
    <button id="btn-water" disabled>💧 Tưới nước</button>
  </div>
</div>

<div class="wrap">
  <div id="garden">
    <div id="trunk"></div>
    <div class="ground"></div>

    <div class="card" id="messageCard" aria-hidden="true">
      <h2>Chúc mừng 8/3 🌸</h2>
      <p>Chúc bạn luôn rực rỡ, bình an và có thật nhiều nụ cười.  
      Cảm ơn vì đã là chính bạn — thật đẹp.</p>
      <p style="margin-top:12px; font-weight:600; color:#666">— Duy Quang</p>
    </div>

    <div class="signature">Duy Quang</div>
  </div>
</div>

<script>
/* ====== Config & state ====== */
const garden = document.getElementById('garden');
const trunk = document.getElementById('trunk');
const btnSow = document.getElementById('btn-sow');
const btnWater = document.getElementById('btn-water');
const messageCard = document.getElementById('messageCard');

let planted = false;
let watered = false;
let branches = [];
let flowers = [];
const FLOWER_MESSAGES = [
  "Bạn thật tuyệt",
  "Luôn tỏa sáng",
  "Cảm ơn bạn",
  "Chúc hạnh phúc",
  "Stay amazing",
  "Always smile",
  "Mãi rực rỡ",
  "Bạn rất đặc biệt",
  "Chúc thành công",
  "Luôn mạnh mẽ"
];

/* UTILS */
function rand(min,max){ return Math.random()*(max-min)+min; }
function toRad(deg){ return deg * Math.PI/180 }

/* ====== UI actions ====== */
btnSow.addEventListener('click', () => {
  if(planted) return;
  planted = true;
  btnSow.disabled = true;
  btnWater.disabled = false;
  // grow trunk by toggling class
  trunk.classList.add('grown');

  // after trunk finished growing -> create branches
  setTimeout(() => createBranches(7), 900); // small delay for better pacing
});

btnWater.addEventListener('click', () => {
  if(!planted || watered) return;
  watered = true;
  btnWater.disabled = true;
  // animate branches growing and flowers popping sequentially
  growBranchesAndFlowers()
});

/* ====== Branch generation ====== */
function createBranches(count=6){
  branches = []
  const gardenW = garden.clientWidth;
  const centerX = gardenW / 2;
  // trunk base bottom (px measured from bottom): trunk is bottom:90px, trunk.height computed
  const trunkBottomBase = 90; // matches CSS bottom
  const trunkH = trunk.offsetHeight; // current trunk height (grown)
  for(let i=0;i<count;i++){
    const b = document.createElement('div');
    b.className = 'branch';
    // random horizontal offset from trunk center
    const offset = rand(-140,140) * (1 - Math.abs(i - (count/2))/(count)); // some spread
    const baseAlongTrunk = trunkH * (0.2 + i*(0.7/count)); // where the branch attaches measured from trunk bottom
    const attachBottom = trunkBottomBase + baseAlongTrunk; // px from garden bottom
    const angleDeg = rand(-55,55);
    const angleRad = toRad(angleDeg);
    const targetHeight = rand(70, 120); // final branch length in px

    // set initial positioning (height 0)
    b.style.left = `calc(50% + ${offset}px)`;
    b.style.bottom = `${attachBottom}px`;
    b.style.transform = `rotate(${angleDeg}deg)`;
    b.dataset.angle = angleDeg;
    b.dataset.targetHeight = targetHeight;
    b.dataset.attachBottom = attachBottom;
    b.dataset.offset = offset;

    garden.appendChild(b);
    branches.push(b);
  }
}

/* ====== Grow branches then spawn flowers ====== */
function growBranchesAndFlowers(){
  // animate each branch's height with a stagger
  let totalFlowersCreated = 0;
  const createFlowerPromises = [];

  branches.forEach((b, idx) => {
    const delay = idx * 220;
    setTimeout(() => {
      // set height (this triggers CSS transition)
      b.style.height = `${b.dataset.targetHeight}px`;

      // after branch finished growing, compute tip and spawn 1-3 flowers
      setTimeout(() => {
        const tipInfo = computeBranchTip(b);
        const flowerCount = Math.floor(rand(1,3.1));
        for(let f=0; f<flowerCount; f++){
          const p = spawnFlowerAt(tipInfo.x, tipInfo.bottom, f * 180 + (idx*80));
          createFlowerPromises.push(p);
          totalFlowersCreated++;
        }
      }, 900); // wait for branch height transition
    }, delay);
  });

  // after all flowers added and animations done -> show card
  // approximate wait: branches count * 220 + 900 + (max flower stagger ~ 900)
  const approxWait = branches.length*220 + 1600 + 1200;
  setTimeout(() => {
    // show message card
    messageCard.classList.add('show');
  }, approxWait);
}

/* Compute branch tip coordinates relative to garden */
function computeBranchTip(branch){
  const gardenW = garden.clientWidth;
  const centerX = gardenW/2;
  const offset = parseFloat(branch.dataset.offset);
  const attachBottom = parseFloat(branch.dataset.attachBottom);
  const angleDeg = parseFloat(branch.dataset.angle);
  const angleRad = toRad(angleDeg);
  const h = parseFloat(branch.dataset.targetHeight);

  // base point in garden coordinates:
  const baseX = centerX + offset;
  const tipX = baseX + Math.sin(angleRad) * h;
  const tipBottom = attachBottom + Math.cos(angleRad) * h;

  return { x: tipX, bottom: tipBottom, baseX, attachBottom, angleRad, h };
}

/* Spawn one flower at (x,bottom) after optional delay (ms). Returns a Promise that resolves when shown. */
function spawnFlowerAt(x, bottom, delay = 0){
  return new Promise(resolve => {
    const f = document.createElement('div');
    f.className = 'flower';
    // pick random color palette
    const palettes = [
      ['#ff6fa3','#ffb3d1'],
      ['#ff8c42','#ffd8b3'],
      ['#7ad3a8','#cdeee0'],
      ['#6fa8ff','#cfe6ff']
    ];
    const p = palettes[Math.floor(Math.random()*palettes.length)];
    // gradient background
    f.style.background = `linear-gradient(180deg, ${p[0]} 0%, ${p[1]} 100%)`;

    // random message
    const txt = FLOWER_MESSAGES[Math.floor(Math.random()*FLOWER_MESSAGES.length)];
    f.textContent = txt;

    // position: convert x (px from left of garden) to left in px (we center the flower)
    const leftPx = x - 23; // half width approx
    f.style.left = `${leftPx}px`;
    f.style.bottom = `${bottom - 20}px`; // slightly shift to center

    // tooltip element
    const tip = document.createElement('div');
    tip.className = 'tooltip';
    tip.textContent = txt;
    f.appendChild(tip);

    // click to toggle tooltip
    f.addEventListener('click', (ev) => {
      ev.stopPropagation();
      const rect = f.getBoundingClientRect();
      // set tooltip position relative to flower (its inside, so simple)
      if(tip.classList.contains('show')){
        tip.classList.remove('show');
      } else {
        // hide other tooltips
        document.querySelectorAll('.tooltip.show').forEach(t=>t.classList.remove('show'));
        tip.classList.add('show');
      }
    });

    // click outside to hide tooltips
    document.addEventListener('click', ()=> document.querySelectorAll('.tooltip.show').forEach(t=>t.classList.remove('show')));

    garden.appendChild(f);
    flowers.push(f);

    // show with staggered pop
    setTimeout(() => {
      f.classList.add('show');
      // small gentle up animation using CSS transform + will be visible
      setTimeout(()=> resolve(f), 500);
    }, delay + rand(80,420));
  });
}

/* ====== Extra: resize handling so layout still correct ====== */
window.addEventListener('resize', () => {
  // nothing heavy needed: we rely on absolute px positions computed at creation time
});

/* ====== Accessibility: quick keyboard triggers ====== */
window.addEventListener('keydown', (e)=>{
  if(e.key === 'Enter' && !planted) btnSow.click();
  if(e.key === ' ' && planted && !watered) btnWater.click();
});

</script>
</body>
</html>
