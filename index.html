<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>8/3 Memory Garden</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
overflow:hidden;
font-family:'Quicksand',sans-serif;

background:linear-gradient(
180deg,
#ffe6f0 0%,
#fff4e6 40%,
#e6ffe6 100%
);
}

#garden{
position:relative;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

h1{
font-family:'Dancing Script',cursive;
font-size:48px;
color:#ff4d88;
margin-bottom:10px;
}

.subtitle{
opacity:.7;
margin-bottom:30px;
}

button{
padding:14px 30px;
border:none;
border-radius:30px;
background:#ff4d88;
color:white;
font-size:16px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.1);
}

#tree{
position:absolute;
bottom:0;
width:8px;
height:0;
background:#5c3b28;
transition:2s;
}

.branch{
position:absolute;
width:6px;
height:0;
background:#5c3b28;
transform-origin:bottom;
}

.flower{
position:absolute;
width:40px;
height:40px;
border-radius:50%;
background:#ff7eb3;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
font-size:10px;
padding:6px;
color:white;

opacity:0;
transform:scale(0);
transition:1s;
}

#messageCard{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(.7);

background:white;
padding:40px;

border-radius:20px;
box-shadow:0 20px 60px rgba(0,0,0,.2);

opacity:0;
transition:1.5s;
text-align:center;
max-width:500px;
}

#messageCard h2{
font-family:'Dancing Script';
font-size:42px;
color:#ff4d88;
}

#messageCard p{
line-height:1.6;
}

</style>
</head>


<body>

<div id="garden">

<h1>Memory Garden</h1>
<p class="subtitle">Chạm để trồng một điều đẹp</p>

<button onclick="growTree()">🌱 Gieo hạt</button>

<div id="tree"></div>

<div id="messageCard">

<h2>Happy Women's Day 🌸</h2>

<p>

Chúc bạn luôn rực rỡ như những bông hoa trong khu vườn này.  
Mong rằng mỗi ngày đều mang đến cho bạn  
một chút niềm vui, một chút may mắn  
và thật nhiều nụ cười.

</p>

<p style="margin-top:20px">

Cảm ơn vì đã xuất hiện trong thế giới này ✨

</p>

<p style="margin-top:30px">

— Duy Quang

</p>

</div>

</div>

<script>

const tree = document.getElementById("tree")
const garden = document.getElementById("garden")

let grown = false

function growTree(){

if(grown) return
grown = true

tree.style.height = "250px"

setTimeout(createBranches,2000)

}

function createBranches(){

for(let i=0;i<6;i++){

let b = document.createElement("div")
b.className = "branch"

b.style.left = "50%"
b.style.bottom = (80 + i*25) + "px"

let angle = (Math.random()*60)-30
b.style.transform = "rotate("+angle+"deg)"

garden.appendChild(b)

setTimeout(()=>{

b.style.height = "80px"

setTimeout(()=>createFlower(b),1000)

},200)

}

}

function createFlower(branch){

let f = document.createElement("div")

f.className = "flower"

const messages=[
"Bạn thật tuyệt",
"Luôn tỏa sáng",
"Cảm ơn bạn",
"Chúc hạnh phúc",
"Stay amazing",
"Always smile"
]

f.innerText = messages[Math.floor(Math.random()*messages.length)]

f.style.left = branch.offsetLeft + (Math.random()*60-30) + "px"
f.style.bottom = branch.offsetTop + 60 + "px"

garden.appendChild(f)

setTimeout(()=>{

f.style.opacity=1
f.style.transform="scale(1)"

},200)

setTimeout(showFinal,4000)

}

function showFinal(){

document.getElementById("messageCard").style.opacity=1
document.getElementById("messageCard").style.transform="translate(-50%,-50%) scale(1)"

}

</script>

</body>
</html>
